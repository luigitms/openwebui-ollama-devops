name: K3D Deploy Test

on:
push:
branches:
- main

pull_request:
branches:
- main

workflow_dispatch:

jobs:
k3d-deploy:
name: Deploy Helm chart on k3d
runs-on: ubuntu-latest
timeout-minutes: 30

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install kubectl
    uses: azure/setup-kubectl@v4

  - name: Install Helm
    uses: azure/setup-helm@v4

  - name: Install k3d
    run: |
      curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      k3d version

  - name: Create k3d cluster
    run: |
      k3d cluster create openwebui-ci --agents 1
      kubectl get nodes

  - name: Helm lint
    run: helm lint ./kubernetes/helm/openwebui-ollama

  - name: Deploy chart with Helm without model init
    run: |
      helm upgrade --install openwebui ./kubernetes/helm/openwebui-ollama \
        -n openwebui \
        --create-namespace \
        -f ./kubernetes/helm/openwebui-ollama/values-local.yaml \
        --set modelInit.enabled=false \
        --timeout 10m

  - name: Wait for deployments
    run: |
      kubectl rollout status deployment/openwebui-ollama-ollama -n openwebui --timeout=300s
      kubectl rollout status deployment/openwebui-ollama-openwebui -n openwebui --timeout=300s

  - name: Show Kubernetes resources
    run: |
      kubectl get pods -n openwebui
      kubectl get svc -n openwebui
      kubectl get pvc -n openwebui
      helm list -n openwebui

  - name: Test Open WebUI service inside cluster
    run: |
      kubectl run curl-test \
        -n openwebui \
        --image=curlimages/curl:latest \
        --restart=Never \
        --rm -i \
        --command -- sh -c '
          echo "Waiting for Open WebUI service..."
          for i in $(seq 1 30); do
            if curl -fsS http://openwebui-ollama-openwebui:8080 > /dev/null; then
              echo "Open WebUI service is reachable"
              exit 0
            fi
            echo "Open WebUI not ready yet, retry $i/30..."
            sleep 10
          done
          echo "Open WebUI service is not reachable after retries"
          exit 1
        '

  - name: Cleanup k3d cluster
    if: always()
    run: k3d cluster delete openwebui-cia