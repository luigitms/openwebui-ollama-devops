services:
  ollama:
    image: ollama/ollama:latest
    container_name: openwebui-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  ollama-model-init:
    image: ollama/ollama:latest
    container_name: openwebui-ollama-model-init
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 10 &&
      ollama pull ${OLLAMA_MODEL:-llama3.2:1b} &&
      echo 'Model ${OLLAMA_MODEL:-llama3.2:1b} pulled successfully'"
    volumes:
      - ollama-data:/root/.ollama
    restart: "no"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    depends_on:
      - ollama
      - ollama-model-init
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
    volumes:
      - openwebui-data:/app/backend/data
    restart: unless-stopped

volumes:
  ollama-data:
  openwebui-data: